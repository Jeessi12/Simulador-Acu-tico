<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Notificaciones - Ecosistema Marino</title>
    <link rel="stylesheet" href="../CSS/notificaciones.css">
    <link rel="stylesheet" href="../CSS/navbar-footer.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="../MEDIA/logo.png" type="image/png">
    <script src="../JS/navbar-footer.js" defer></script>
</head>

<body>

    <div id="navbar-container"></div>
    <div class="spacer"></div>

    <div class="container">

        <!-- Sidebar mejorada -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-bell"></i>
                <h2>Notificaciones</h2>
            </div>
            <ul>
                <li class="active" data-filter="recibidos">
                    <i class="fas fa-inbox"></i> Recibidos
                    <span class="badge" id="recibidosCount">0</span>
                </li>
                <li data-filter="destacados">
                    <i class="fas fa-star"></i> Destacados
                    <span class="badge" id="destacadosCount">0</span>
                </li>
                <li data-filter="no-leidos">
                    <i class="fas fa-envelope"></i> Sin leer
                    <span class="badge" id="noLeidosCount">0</span>
                </li>
                <li data-filter="papelera">
                    <i class="fas fa-trash-alt"></i> Papelera
                </li>
                <li class="more-container">
                    <span id="moreBtn">
                        <i class="fas fa-ellipsis-h"></i> Más ▾
                    </span>
                    <ul class="dropdown" id="dropdownMenu">
                        <li data-filter="archivados"><i class="fas fa-archive"></i> Archivados</li>
                        <li data-filter="importantes"><i class="fas fa-flag"></i> Importantes</li>
                        <li data-filter="spam"><i class="fas fa-ban"></i> Spam</li>
                    </ul>
                </li>
            </ul>
        </aside>

        <!-- Main mejorado -->
        <main class="main">

            <!-- Header con acciones -->
            <div class="header">
                <div class="header-actions">
                    <button id="refresh" title="Actualizar">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                    <button id="markReadBtn" title="Marcar como leídas">
                        <i class="fas fa-check-double"></i>
                    </button>
                    <button id="deleteSelectedBtn" title="Eliminar seleccionadas">
                        <i class="fas fa-trash-alt"></i>
                    </button>
                    <button id="selectAllBtn" title="Seleccionar todas">
                        <i class="fas fa-check-square"></i>
                    </button>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar notificaciones...">
                </div>
            </div>

            <!-- Tabla de notificaciones -->
            <div class="list-container">
                <div class="list" id="notificationList">
                    <div class="row header-row">
                        <span class="checkbox-cell"><input type="checkbox" id="headerCheckbox"></span>
                        <span>De</span>
                        <span>Asunto</span>
                        <span class="date-cell">Fecha</span>
                    </div>
                </div>
                <div class="empty-state" id="emptyState" style="display: none;">
                    <i class="fas fa-water"></i>
                    <p>No hay notificaciones en esta categoría</p>
                    <span>Las alertas marinas aparecerán aquí</span>
                </div>
            </div>

            <!-- Paginación -->
            <div class="pagination" id="pagination">
                <button id="prevPage" disabled><i class="fas fa-chevron-left"></i></button>
                <span id="pageInfo">Página 1</span>
                <button id="nextPage"><i class="fas fa-chevron-right"></i></button>
            </div>

        </main>

    </div>

    <div class="spacer"></div>

    <div id="footer-container"></div>

    <!-- Font Awesome para íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="../JS/notificaciones.js"></script>
    <script src="../JS/session.js" defer></script>

</body>

</html>
